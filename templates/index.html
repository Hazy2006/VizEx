<!DOCTYPE html>
<html>
<head>
  <title>VizEx</title>
  <style>
    body { margin: 0; background: #0d1117; font-family: monospace; }
    h1 { color: #58a6ff; text-align: center; padding: 20px; margin: 0; font-size: 18px; letter-spacing: 0.1em; }
    svg { display: block; margin: auto; }
    .link { stroke: #30363d; stroke-width: 1.5px; marker-end: url(#arrow); }
    .node circle { fill: #1f6feb; stroke: #58a6ff; stroke-width: 1.5px; }
    .node text { fill: #e6edf3; font-size: 13px; }
  </style>
</head>
<body>
  <h1>VizEx — C++ Call Graph</h1>
  <svg id="graph"></svg>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script>
    const width = window.innerWidth;
    const height = window.innerHeight - 80;
    const svg = d3.select("#graph").attr("width", width).attr("height", height);
    svg.append("defs").append("marker")
      .attr("id", "arrow").attr("viewBox", "0 -5 10 10")
      .attr("refX", 20).attr("refY", 0)
      .attr("markerWidth", 6).attr("markerHeight", 6)
      .attr("orient", "auto")
      .append("path").attr("d", "M0,-5L10,0L0,5").attr("fill", "#58a6ff");
    fetch('/graph').then(r => r.json()).then(data => {
      const nodeIds = new Set(data.nodes.map(n => n.id));
      const links = data.links.filter(l => nodeIds.has(l.source) && nodeIds.has(l.target));
      const sim = d3.forceSimulation(data.nodes)
        .force("link", d3.forceLink(links).id(d => d.id).distance(150))
        .force("charge", d3.forceManyBody().strength(-300))
        .force("center", d3.forceCenter(width / 2, height / 2));
      const link = svg.append("g").selectAll("line").data(links).enter().append("line").attr("class", "link");
      const node = svg.append("g").selectAll("g").data(data.nodes).enter().append("g").attr("class", "node")
        .call(d3.drag()
          .on("start", (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
          .on("drag", (e, d) => { d.fx = Math.max(20, Math.min(width - 20, e.x)); d.fy = Math.max(20, Math.min(height - 20, e.y)); })
          .on("end", (e, d) => { if (!e.active) sim.alphaTarget(0); }));
      node.append("circle").attr("r", 18);
      node.append("text").attr("dy", 35).attr("text-anchor", "middle").text(d => d.id);
      sim.on("tick", () => {
        data.nodes.forEach(d => {
          d.x = Math.max(20, Math.min(width - 20, d.x));
          d.y = Math.max(20, Math.min(height - 20, d.y));
        });
        link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
            .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
        node.attr("transform", d => `translate(${d.x},${d.y})`);
      });
    });
  </script>
</body>
</html>
